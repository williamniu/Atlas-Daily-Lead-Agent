services:
  - type: web
    name: atlas-daily-lead-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/dashboard/streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: USE_MOCK_DATA
        value: "false"
      - key: LIVE_DATA_PROVIDER
        value: twitterapi_io
      - key: INSFORGE_DATABASE_URL
        sync: false
      - key: TWITTERAPI_IO_API_KEY
        sync: false
      - key: TWITTERAPI_IO_BASE_URL
        value: https://api.twitterapi.io
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
